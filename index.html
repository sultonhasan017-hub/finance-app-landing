<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>FinanceApp - Kelola Uangmu</title>
  </head>
  <body>
    <header>
      <div class="logo"><strong>Finance</strong>App</div>
      <nav></nav>
    </header>
    <main>
      <section class="hero">
        <h1>
          Monitor Keuanganmu <br />
          <span style="color: var(--primary-color)">Tanpa Ribet.</span>
        </h1>
        <p>
          Dashboard pencatat pengeluaran otomatis dengan standar keamanan
          industri.
        </p>
        <button class="btn-primary">Coba Demo Gratis</button>
      </section>
      <section
        class="calculator-box"
        style="
          padding: 50px 5%;
          background: white;
          margin: 20px;
          border-radius: 15px;
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0, 1);
        "
      >
        <h3>Simulasi Tabungan</h3>
        <div style="display: flex; gap: 10px; margin-top: 15px">
          <input
            type="number"
            id="inputPemasukan"
            placeholder="Masukkan Pemasukan (Rp)"
            style="
              padding: 10px;
              flex: 1;
              border: 1px solid #ddd;
              border-radius: 5px;
            "
          />
          <button id="btnHitung" class="btn-primary" style="margin-top: 0">
            Hitung Pajak (11%)
          </button>
        </div>
        <p
          id="hsilPajak"
          style="margin-top: 15px; font-weight: bold; color: #e11d48"
        ></p>
      </section>
      <section class="transaction-box" style="padding: 30px 5%; margin: 20px">
        <h3>Catat Pengeluaran</h3>
        <div
          style="
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
          "
        >
          <input type="text" id="namaItem" placeholder="Beli apa hari ini?" />
          <input type="number" id="jumlahItem" placeholder="Nominal (Rp)" />
          <button id="btnTambah" class="btn-primary">Tambah Transaksi</button>
        </div>

        <h4>Riwayat Transaksi</h4>
        <ul
          id="daftarTransaksi"
          style="list-style: none; margin-top: 15px; padding: 0"
        >
          <!-- Data akan muncul di sini via JavaScript -->
        </ul>
      </section>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
